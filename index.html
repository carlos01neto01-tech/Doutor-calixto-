<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doutor Calixto</title>

<link href="https://fonts.googleapis.com/css2?family=Kameron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --gold:#b49357;
  --bg:#f2f2f2;
  --dark:#1e1e1e;
}

body{
  margin:0;
  font-family:'Kameron', serif;
  background:var(--bg);
}

/* ================= MOBILE PADRÃO ================= */

@media (max-width:640px){

  h1,h2{
    font-size:42px;
    line-height:1.05;
    text-align:center;
  }

  p{
    font-size:19px;
    line-height:1.3;
    text-align:center;
  }

  /* BOTÕES GRANDES */
  .btn{
    width:100%;
    min-height:72px;
    font-size:20px;
    border-radius:16px;
    border:none;
    font-weight:700;
  }

  .btn-primary{
    background:var(--gold);
    color:white;
  }

  .btn-outline{
    background:transparent;
    border:2px solid var(--gold);
  }

}

/* ================= SOBRE ================= */

.sobre{
  text-align:center;
  padding:60px 20px;
}

.sobre img{
  width:85%;
  max-width:320px;
  border-radius:20px;
  margin-bottom:20px;
}

/* ================= CASES ================= */

.cases{
  background:var(--dark);
  color:white;
  padding:60px 0;
}

.cases h2{
  max-width:90%;
  margin:auto;
}

/* ANTES/DEPOIS */

.before-after{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  margin:20px;
}

.before-after img{
  width:100%;
  object-fit:contain;
}

.slider{
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:white;
  left:50%;
}

.circle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:34px;
  height:34px;
  background:var(--gold);
  border-radius:50%;
}

/* ================= CARROSSEL ================= */

.carousel{
  display:flex;
  overflow:hidden;
  gap:14px;
  margin-top:30px;
}

.track{
  display:flex;
  gap:14px;
  animation:scroll 20s linear infinite;
}

.carousel img{
  width:160px;
  border-radius:14px;
}

.fade{
  position:absolute;
  top:0;
  bottom:0;
  width:40px;
}

.fade.left{
  left:0;
  background:linear-gradient(to right,#1e1e1e,transparent);
}

.fade.right{
  right:0;
  background:linear-gradient(to left,#1e1e1e,transparent);
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

</style>
</head>

<body>

<!-- HERO -->
<section style="padding:40px 20px;text-align:center;">
  <h1>Transforme seu sorriso com <span style="color:var(--gold)">previsibilidade</span></h1>
  <p>Planejamento estético personalizado com resultado natural</p>

  <button class="btn btn-primary">Agendar pelo WhatsApp</button>
  <br><br>
  <button class="btn btn-outline">Ver casos de resultado</button>
</section>

<!-- SOBRE -->
<section class="sobre">
  <img src="IIMAGEM.webp">
  <h2>Sobre o <span style="color:var(--gold)">Dr. Calixto</span></h2>
  <p>Especialista em Implantodontia e Periodontia...</p>
</section>

<!-- CASES -->
<section class="cases">

  <h2>“Cada sorriso é único…”</h2>

  <!-- ANTES/DEPOIS -->
  <div class="before-after">
    <img src="ANTES 1.webp">
    <div class="slider"></div>
    <div class="circle"></div>
  </div>

  <!-- CARROSSEL -->
  <div style="position:relative;">
    <div class="fade left"></div>
    <div class="fade right"></div>

    <div class="carousel">
      <div class="track">
        <img src="depo1.webp">
        <img src="depo2.webp">
        <img src="depo3.webp">

        <img src="depo1.webp">
        <img src="depo2.webp">
        <img src="depo3.webp">
      </div>
    </div>
  </div>

  <div style="padding:20px;">
    <button class="btn btn-primary">Quero meu tratamento personalizado</button>
  </div>

</section>

</body>
</html>
